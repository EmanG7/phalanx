- name: Check if 60-coredump.conf exist
  ansible.builtin.stat:
    path: "{{ cis_coredump_conf }}"
  register: coredump_conf_check
  when: (module_cis_1_5_12 or module_cis_1_5_13) | default(true) | bool

- name: If 60-coredump.conf doesn't exist, make file

  block:
  - name: Ensure parent directoy exists
    ansible.builtin.file:
      path: "{{ cis_coredump_conf | dirname }}"
      state: directory
      owner: root
      group: root
  - name: Create 60-coredump.conf
    ansible.builtin.copy:
      dest: "{{ cis_coredump_conf }}"
      content: |
        # Generated by phalanx role using Ansible
        [Coredump]
      mode: 0400
  when: (not coredump_conf_check.stat.exists) and (module_cis_1_5_12 or module_cis_1_5_13) | default(true) | bool

- name: Implement CIS 1.5.12
  ansible.builtin.lineinfile:
    path: "{{ cis_coredump_conf }}"
    regexp: '^ProcessSizeMax=.*'
    line: 'ProcessSizeMax=0'
    insertafter: EOF
  when: module_cis_1_5_12 | default(true) | bool

- name: Implement CIS 1.5.13
  ansible.builtin.lineinfile:
    path: "{{ cis_coredump_conf }}"
    regexp: '^Storage=.*'
    line: 'Storage=none'
    insertafter: EOF
  when: module_cis_1_5_13 | default(true) | bool

