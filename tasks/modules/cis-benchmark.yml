# - name: CIS unused service config ansible header
#   ansible.builtin.lineinfile:
#     path: "{{ cis_unused_services }}"
#     line: "# Generated by phalanx role using Ansible"
#     insertbefore: BOF
#     create: true

- name: Implement CIS 1.1.1.1
  ansible.builtin.lineinfile:
    path: "{{ cis_unused_services }}"
    line: "{{ item }}"
    insertafter: EOF
    create: true
  loop:
    - install cramfs /bin/false
    - blacklist cramfs
  when: module_cis_1_1_1_1 | default(true) | bool

