- name: Implement CIS 1.1.1.1
  ansible.builtin.lineinfile:
    path: "/etc/modprobe.d/cis-unused-services.conf"
    line: "{{ item }}"
    insertafter: EOF
    create: true
  loop:
    - install cramfs /bin/false
    - blacklist cramfs
  when: module_cis_1_1_1_1 | default(true) | bool

