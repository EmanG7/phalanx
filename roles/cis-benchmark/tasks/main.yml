---

- name: Check if cis-unused-services.conf exist
  ansible.builtin.stat:
    path: "{{ cis_unused_services }}"
  register: unused_services_conf_check

- name: If cis-unused-services.conf doesn't exist, make file
  block:
  - name: Ensure parent directoy exists
    ansible.builtin.file:
      path: "{{ cis_unused_services | dirname }}"
      state: directory
      owner: root
      group: root
  - name: Create cis-unused-services.conf
    ansible.builtin.copy:
      dest: "{{ cis_unused_services }}"
      content: |
        # Generated by Ansible using phalanx role
      mode: 0400
  when: not unused_services_conf_check.stat.exists

- name: Implement CIS 1.1.1.1
  ansible.builtin.lineinfile:
    path: "{{ cis_unused_services }}"
    line: "{{ item }}"
    insertafter: EOF
    create: true
  loop:
    - install cramfs /bin/false
    - blacklist cramfs
  

