---
# defaults file for phalanx
disable_backup: false

module_audit: true
module_firewall: true
module_fail2ban: true
module_harden_kernel: true
module_harden_sudoer: true

disable_cis_modules: false

module_cis_1_1_1_1: true
module_cis_1_1_1_2: true
module_cis_1_1_1_3: true
module_cis_1_1_1_4: true
module_cis_1_1_1_5: true
module_cis_1_5_12: true
module_cis_1_5_13: true

iptables_tables: 
  - "filter"
  - "security"
  - "mangle"
  - "nat"
  - "raw"

cis_unused_services: "/etc/modprobe.d/cis-unused-services.conf"
cis_coredump_conf: "/etc/systemd/coredump.conf.d/60-coredump.conf"